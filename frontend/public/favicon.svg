<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2f" />
      <stop offset="100%" stop-color="#0f0f1b" />
    </linearGradient>
    <!-- Sun Gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe47e" />
      <stop offset="40%" stop-color="#ffb703" />
      <stop offset="100%" stop-color="#fb8500" />
    </linearGradient>
    <!-- Cloud Gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cfdce3" />
    </linearGradient>
    <!-- Glow Filter for Sun -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Cloud Shadow -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)" />

  <!-- Sun with Glow -->
  <circle cx="36" cy="24" r="11" fill="url(#sunGrad)" filter="url(#glow)" />

  <!-- Sun Rays (minimalist, clean) -->
  <g stroke="url(#sunGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
    <line x1="36" y1="9" x2="36" y2="5" />
    <line x1="36" y1="39" x2="36" y2="43" />
    <line x1="21" y1="24" x2="17" y2="24" />
    <line x1="51" y1="24" x2="55" y2="24" />
    <line x1="25.5" y1="13.5" x2="22.5" y2="10.5" />
    <line x1="46.5" y1="34.5" x2="49.5" y2="37.5" />
    <line x1="25.5" y1="34.5" x2="22.5" y2="37.5" />
    <line x1="46.5" y1="13.5" x2="49.5" y2="10.5" />
  </g>

  <!-- Cloud (composed of overlapping circles and a base rect/path, with shadow) -->
  <path d="M20 46 h20 a10 10 0 0 0 10 -10 a9 9 0 0 0 -8.5 -9 a12 12 0 0 0 -21.5 1 a8 8 0 0 0 -8 8 a9 9 0 0 0 8 10 z"
        fill="url(#cloudGrad)"
        filter="url(#shadow)" />
</svg>
